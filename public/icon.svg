<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Golden Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9E4B7" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#805B00" />
    </linearGradient>
    <!-- Elegant Emerald Gradient -->
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#125643" />
      <stop offset="50%" stop-color="#093C2F" />
      <stop offset="100%" stop-color="#04221A" />
    </linearGradient>
    <!-- Drop Shadow for Monogram -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Circle with Soft Border -->
  <circle cx="90" cy="90" r="85" fill="url(#emerald-grad)" stroke="url(#gold-grad)" stroke-width="3" />
  
  <!-- Outer Islamic 8-Pointed Star (Rub el Hizb) -->
  <g transform="translate(90, 90)" filter="url(#shadow)">
    <!-- Primary Rotated Octagon -->
    <path d="M -55,-23 L -55,23 L -23,55 L 23,55 L 55,23 L 55,-23 L 23,-55 L -23,-55 Z" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" stroke-linejoin="round" />
    <!-- Secondary Rotated Octagon (45 degrees) -->
    <path d="M -55,-23 L -55,23 L -23,55 L 23,55 L 55,23 L 55,-23 L 23,-55 L -23,-55 Z" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" stroke-linejoin="round" transform="rotate(45)" opacity="0.8" />
    
    <!-- Outer delicate dotted circle -->
    <circle cx="0" cy="0" r="68" fill="none" stroke="url(#gold-grad)" stroke-width="1" stroke-dasharray="2, 4" opacity="0.6" />

    <!-- Elegant Crescent Moon -->
    <path d="M -8 -28 A 28 28 0 1 0 28 8 A 23 23 0 1 1 -8 -28 Z" fill="url(#gold-grad)" transform="rotate(-15) translate(-4, -4)" />
    
    <!-- Small star -->
    <path d="M 16,-16 L 18,-11 L 23,-11 L 19,-8 L 21,-3 L 16,-6 L 11,-3 L 13,-8 L 9,-11 L 14,-11 Z" fill="url(#gold-grad)" transform="scale(0.8)" />

    <!-- Elegant Monogram Initials "A & R" -->
    <!-- Beautiful SVG text using serif styling with fallback fonts -->
    <text x="2" y="18" font-family="'Cinzel', 'Cormorant Garamond', 'Didot', 'Georgia', serif" font-size="28" font-weight="600" fill="url(#gold-grad)" text-anchor="middle" letter-spacing="-1">A&amp;R</text>
  </g>
</svg>